name: verify

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check committed TSOA outputs
        run: |
          npx tsoa spec-and-routes
          git diff --exit-code -- src/backend/api/routes.ts src/backend/api/swagger.json

      - name: Run tests
        run: npm run test
